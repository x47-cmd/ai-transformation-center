  <style id="aiw-boot-loader-style">
    html.aiw-loading,
    html.aiw-loading body {
      overflow: hidden !important;
    }

    #aiwBootLoader {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 100dvh;
      padding:
        max(24px, env(safe-area-inset-top))
        22px
        max(24px, env(safe-area-inset-bottom));
      overflow: hidden;
      background:
        radial-gradient(
          circle at 50% 34%,
          rgba(37, 99, 235, 0.14),
          transparent 34%
        ),
        linear-gradient(
          180deg,
          #fbfdff 0%,
          #f2f6fb 100%
        );
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Arial,
        sans-serif;
      direction: rtl;
      opacity: 1;
      visibility: visible;
      transition:
        opacity 0.38s ease,
        visibility 0.38s ease;
    }

    #aiwBootLoader.aiw-boot-loader--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .aiw-boot-card {
      position: relative;
      display: flex;
      width: min(100%, 390px);
      min-height: 500px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 38px 28px 30px;
      overflow: hidden;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 34px;
      background:
        linear-gradient(
          155deg,
          #06101f 0%,
          #08213f 54%,
          #040b16 100%
        );
      box-shadow: 0 28px 70px rgba(2, 6, 23, 0.22);
      color: #fff;
      text-align: center;
      isolation: isolate;
    }

    .aiw-boot-card::before {
      content: "";
      position: absolute;
      inset: -30%;
      z-index: -2;
      background:
        radial-gradient(
          circle,
          rgba(37, 99, 235, 0.22),
          transparent 58%
        );
      animation: aiwBootGlow 3.2s ease-in-out infinite;
    }

    .aiw-boot-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.035),
          transparent 38%
        );
    }

    .aiw-boot-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      margin-bottom: 28px;
      padding: 8px 15px;
      border: 1px solid rgba(96, 165, 250, 0.16);
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.20);
      color: #78b7ff;
      font-size: 11px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .aiw-boot-orb {
      position: relative;
      display: grid;
      width: 148px;
      height: 148px;
      place-items: center;
      margin-bottom: 30px;
      border: 1px solid rgba(96, 165, 250, 0.26);
      border-radius: 50%;
      background:
        radial-gradient(
          circle at 50% 45%,
          rgba(14, 165, 233, 0.20),
          transparent 38%
        ),
        repeating-radial-gradient(
          circle,
          rgba(96, 165, 250, 0.24) 0 1px,
          transparent 1px 14px
        );
      color: #7dd3fc;
      font-size: 52px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -5px;
      text-shadow: 0 0 36px rgba(56, 189, 248, 0.88);
      box-shadow: 0 0 56px rgba(37, 99, 235, 0.22);
    }

    .aiw-boot-orb::before,
    .aiw-boot-orb::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(96, 165, 250, 0.24);
    }

    .aiw-boot-orb::before {
      inset: -14px;
      animation: aiwBootOrbit 2.8s linear infinite;
    }

    .aiw-boot-orb::after {
      inset: -29px;
      border-style: dashed;
      opacity: 0.62;
      animation: aiwBootOrbitReverse 4.5s linear infinite;
    }

    .aiw-boot-title {
      max-width: 300px;
      margin: 0;
      color: #fff;
      font-size: 25px;
      line-height: 1.55;
      font-weight: 950;
      letter-spacing: -0.4px;
    }

    .aiw-boot-subtitle {
      max-width: 290px;
      margin: 13px 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      line-height: 1.8;
      font-weight: 700;
    }

    .aiw-boot-progress {
      width: min(100%, 270px);
      height: 7px;
      margin-top: 30px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
    }

    .aiw-boot-progress > span {
      display: block;
      width: 44%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2563eb, #38bdf8);
      box-shadow: 0 0 18px rgba(56, 189, 248, 0.65);
      animation: aiwBootProgress 1.35s ease-in-out infinite;
    }

    .aiw-boot-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.58);
      font-size: 11px;
      font-weight: 700;
    }

    .aiw-boot-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #38bdf8;
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.90);
      animation: aiwBootPulse 1.1s ease-in-out infinite;
    }

    .aiw-boot-credit {
      position: absolute;
      right: 0;
      bottom: 18px;
      left: 0;
      color: rgba(255, 255, 255, 0.32);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    @keyframes aiwBootGlow {
      0%,
      100% {
        transform: scale(0.94);
        opacity: 0.72;
      }

      50% {
        transform: scale(1.06);
        opacity: 1;
      }
    }

    @keyframes aiwBootOrbit {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes aiwBootOrbitReverse {
      to {
        transform: rotate(-360deg);
      }
    }

    @keyframes aiwBootProgress {
      0% {
        transform: translateX(165%);
      }

      100% {
        transform: translateX(-250%);
      }
    }

    @keyframes aiwBootPulse {
      0%,
      100% {
        transform: scale(0.78);
        opacity: 0.52;
      }

      50% {
        transform: scale(1.18);
        opacity: 1;
      }
    }

    @media (max-width: 430px) {
      .aiw-boot-card {
        width: 100%;
        min-height: 480px;
        padding: 34px 22px 28px;
        border-radius: 30px;

      }

      .aiw-boot-subtitle {
        font-size: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .aiw-boot-card::before,
      .aiw-boot-orb::before,
      .aiw-boot-orb::after,
      .aiw-boot-progress > span,
      .aiw-boot-status-dot {
        animation: none !important;
      }
    }
  </style>

  <!-- 13. Boot Loader Controller                           -->
  <!-- ===================================================== -->

  <script>
    (function manageAIWBootLoader() {
      "use strict";

      const loader = document.getElementById("aiwBootLoader");
      const appMain = document.getElementById("appMain");

      let hidden = false;
      let observer = null;
      let safetyTimer = null;

      function hasRenderedContent() {
        if (!appMain) return false;

        return Boolean(
          appMain.querySelector(
            ".module-page, [data-page], [data-module-page]"
          )
        );
      }

      function hideLoader() {
        if (hidden || !loader) return;

        hidden = true;
        loader.classList.add("aiw-boot-loader--hidden");
        document.documentElement.classList.remove("aiw-loading");

        observer?.disconnect();
        window.clearTimeout(safetyTimer);

        window.setTimeout(() => {
          loader.remove();

          document
            .getElementById("aiw-boot-loader-style")
            ?.remove();
        }, 450);
      }

      function checkReady() {
        if (!hasRenderedContent()) return;

        window.requestAnimationFrame(() => {
          window.requestAnimationFrame(() => {
            window.setTimeout(hideLoader, 90);
          });
        });
      }

      if (appMain) {
        observer = new MutationObserver(checkReady);

        observer.observe(appMain, {
          childList: true,
          subtree: true
        });
      }

      document.addEventListener(
        "DOMContentLoaded",
        checkReady,
        { once: true }
      );

      window.addEventListener(
        "load",
        checkReady,
        { once: true }
      );

      window.addEventListener(
        "aiw:appReady",
        checkReady,
        { once: true }
      );

      window.addEventListener(
        "aiw:shellReady",
        checkReady,
        { once: true }
      );

      window.addEventListener(
        "aiw:moduleRendered",
        checkReady,
        { once: true }
      );

      safetyTimer = window.setTimeout(
        hideLoader,
        7000
      );
    })();
  </script>
