<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>AI Work | مركز التحول المؤسسي بالذكاء الاصطناعي</title>
  <meta name="description" content="منصة تنفيذية لإدارة استراتيجية التحول المؤسسي بالذكاء الاصطناعي، المشاريع، الأفكار، مؤشرات الأداء، النضج، الحوكمة والتقارير." />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="AI Work" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="app" class="aiw-app" data-version="1.6.0">

    <header id="appHeader" class="aiw-header" role="banner"></header>

    <main id="appMain" class="aiw-main" role="main"></main>

    <div id="toastContainer" class="aiw-toast-container" aria-live="polite"></div>
    <div id="modalRoot" class="aiw-modal-root" aria-hidden="true"></div>
    <div id="drawerRoot" class="aiw-drawer-root" aria-hidden="true"></div>
    <div id="overlayRoot" class="aiw-overlay-root" aria-hidden="true"></div>

    <div id="loadingScreen" class="aiw-loading-screen" aria-hidden="true">
      <div class="aiw-loading-card">
        <div class="aiw-loading-logo">AI</div>
        <strong>AI Transformation Center</strong>
        <small>Loading executive workspace...</small>
      </div>
    </div>

    <nav id="bottomNav" class="aiw-bottom-nav aiw-bottom-nav-7" role="navigation" aria-label="التنقل الرئيسي">
      <button type="button" data-module="dashboard" class="aiw-nav-item active" aria-label="الرئيسية">
        <span>🏠</span>
        <small>الرئيسية</small>
      </button>

      <button type="button" data-module="strategy" class="aiw-nav-item" aria-label="الاستراتيجية">
        <span>🎯</span>
        <small>الاستراتيجية</small>
      </button>

      <button type="button" data-module="projects" class="aiw-nav-item" aria-label="المشاريع">
        <span>📁</span>
        <small>المشاريع</small>
      </button>

      <button type="button" data-module="ideas" class="aiw-nav-item" aria-label="الأفكار">
        <span>💡</span>
        <small>الأفكار</small>
      </button>

      <button type="button" data-module="governance" class="aiw-nav-item" aria-label="الحوكمة">
        <span>🏛️</span>
        <small>الحوكمة</small>
      </button>

      <button type="button" data-module="maturity" class="aiw-nav-item" aria-label="النضج">
        <span>🧠</span>
        <small>النضج</small>
      </button>

      <button type="button" data-module="reports" class="aiw-nav-item" aria-label="التقارير">
        <span>📊</span>
        <small>التقارير</small>
      </button>
    </nav>
  </div>

  <!-- Core Config -->
  <script src="js/config/config.js"></script>

  <!-- Core Data / Store -->
  <script src="js/store.js"></script>
  <script src="js/data/aiw-data.js"></script>
  <script src="js/localization/translations.js"></script>

  <!-- Core Engines -->
  <script src="js/core/widgets.js"></script>

  <!-- Current Modules -->
  <script src="js/modules/dashboard/dashboard.js"></script>
  <script src="js/modules/strategy/strategy.js"></script>
  <script src="js/modules/projects/projects.js"></script>
  <script src="js/modules/ideas/ideas.js"></script>
  <script src="js/modules/governance/governance.js"></script>
  <script src="js/modules/maturity/maturity.js"></script>
  <script src="js/modules/reports/reports.js"></script>

  <!-- Future Modules - نفعلها بعد إضافة الروتات -->
  <!-- <script src="js/modules/kpis/kpis.js"></script> -->
  <!-- <script src="js/modules/business/business.js"></script> -->

  <!-- App Core -->
  <script src="js/core/app.js"></script>
</body>
</html>
