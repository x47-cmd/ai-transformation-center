<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>
    AI Work | منصة الذكاء البيومتري المؤسسية
  </title>

  <meta
    name="description"
    content="منصة تنفيذية مؤسسية لإدارة فرص ومشاريع الذكاء الاصطناعي للأنظمة البيومترية والبوابات الذكية، مع الحوكمة، مؤشرات الأداء، الأتمتة، القرار، والتقارير التنفيذية."
  />

  <meta
    name="theme-color"
    content="#f8fafc"
  />

  <meta
    name="color-scheme"
    content="light"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-title"
    content="AI Work"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  />

  <link
    rel="stylesheet"
    href="css/style.css?v=5.0.2"
  />

  <link
    rel="stylesheet"
    href="css/enterprise.css?v=5.0.2"
  />
</head>

<body>
  <noscript>
    <div
      style="
        margin: 24px;
        padding: 18px;
        border-radius: 16px;
        background: #fff3cd;
        color: #664d03;
        font-family: Arial, sans-serif;
        text-align: center;
      "
    >
      تتطلب منصة AI Work تفعيل JavaScript للعمل.
    </div>
  </noscript>

  <div
    id="app"
    class="aiw-app enterprise-app"
    data-aiw-root
    data-version="5.4.1"
  >
    <header
      id="appHeader"
      class="aiw-header enterprise-topbar"
      role="banner"
    ></header>

    <main
      id="appMain"
      class="aiw-main enterprise-main"
      data-app-main
      role="main"
      tabindex="-1"
    ></main>

    <div
      id="toastContainer"
      class="aiw-toast-container"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <div
      id="modalRoot"
      class="aiw-modal-root"
      aria-hidden="true"
    ></div>

    <div
      id="drawerRoot"
      class="aiw-drawer-root"
      aria-hidden="true"
    ></div>

    <div
      id="overlayRoot"
      class="aiw-overlay-root"
      aria-hidden="true"
    ></div>

    <nav
      id="bottomNav"
      class="aiw-bottom-nav enterprise-bottom-nav"
      role="navigation"
      aria-label="التنقل الرئيسي"
    >
      <button
        type="button"
        data-module="dashboard"
        data-route="dashboard"
        class="aiw-nav-item nav-item active"
        aria-current="page"
      >
        <span class="nav-icon" aria-hidden="true">🏠</span>
        <small>الرئيسية</small>
      </button>

      <button
        type="button"
        data-module="ideas"
        data-route="ideas"
        class="aiw-nav-item nav-item"
      >
        <span class="nav-icon" aria-hidden="true">💡</span>
        <small>الأفكار</small>
      </button>

      <button
        type="button"
        data-module="projects"
        data-route="projects"
        class="aiw-nav-item nav-item"
      >
        <span class="nav-icon" aria-hidden="true">📁</span>
        <small>المشاريع</small>
      </button>

      <button
        type="button"
        data-module="strategy"
        data-route="strategy"
        class="aiw-nav-item nav-item"
      >
        <span class="nav-icon" aria-hidden="true">🎯</span>
        <small>الاستراتيجية</small>
      </button>

      <button
        type="button"
        data-module="reports"
        data-route="reports"
        class="aiw-nav-item nav-item"
      >
        <span class="nav-icon" aria-hidden="true">📊</span>
        <small>التقارير</small>
      </button>

      <button
        type="button"
        data-module="settings"
        data-route="settings"
        class="aiw-nav-item nav-item"
      >
        <span class="nav-icon" aria-hidden="true">⋮</span>
        <small>المزيد</small>
      </button>
    </nav>
  </div>

  <!-- ===================================================== -->
  <!-- 1. Global Configuration                              -->
  <!-- ===================================================== -->

  <script src="js/config/config.js?v=5.0.1"></script>

  <!-- ===================================================== -->
  <!-- 2. Central Store V2.3                                -->
  <!-- ===================================================== -->

  <script src="js/store.js?v=2.3.0"></script>

  <!-- ===================================================== -->
  <!-- 3. Enterprise Seed Data                              -->
  <!-- ===================================================== -->

  <script src="js/data/aiw-data.js?v=5.0.1"></script>

  <!-- ===================================================== -->
  <!-- 4. Localization                                      -->
  <!-- ===================================================== -->

  <script src="js/localization/translations.js?v=5.0.1"></script>

  <!-- ===================================================== -->
  <!-- 5. External Libraries                                -->
  <!-- ===================================================== -->

  <script
    src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
  ></script>

  <!-- ===================================================== -->
  <!-- 6. Shared UI and Analytics Engines                   -->
  <!-- ===================================================== -->

  <script src="js/core/widgets.js?v=5.0.1"></script>
  <script src="js/core/charts.js?v=5.0.1"></script>
  <script src="js/core/analytics.js?v=5.0.1"></script>
  <script src="js/core/biometric-analytics.js?v=5.0.1"></script>

  <!-- ===================================================== -->
  <!-- 7. Operational Engines                               -->
  <!-- ===================================================== -->

  <script src="js/core/automation.js?v=5.0.1"></script>
  <script src="js/core/ai-engine.js?v=5.0.1"></script>
  <script src="js/core/decision-engine.js?v=5.0.1"></script>
  <script src="js/core/recommendation-engine.js?v=5.0.1"></script>
  <script src="js/core/export.js?v=5.0.1"></script>
  <script src="js/core/notifications.js?v=5.0.1"></script>
  <script src="js/core/permissions.js?v=5.0.1"></script>

  <!-- ===================================================== -->
  <!-- 8. Core Navigation and Shell                         -->
  <!-- Shell is initialized only by app.js.                 -->
  <!-- ===================================================== -->

  <script src="js/core/router.js?v=5.0.1"></script>
  <script src="js/core/shell.js?v=5.0.1"></script>

  <!-- ===================================================== -->
  <!-- 9. Application Modules                               -->
  <!-- ===================================================== -->

  <script src="js/modules/dashboard/dashboard.js?v=5.0.1"></script>
  <script src="js/modules/strategy/strategy.js?v=5.0.1"></script>
  <script src="js/modules/projects/projects.js?v=5.2.1"></script>
  <script src="js/modules/projects/project-phase-playbook.js?v=1.0.0"></script>
  <script src="js/modules/ideas/ideas.js?v=5.1.0"></script>
  <script src="js/modules/governance/governance.js?v=5.0.1"></script>
  <script src="js/modules/maturity/maturity.js?v=5.0.1"></script>
  <script src="js/modules/reports/reports.js?v=5.0.1"></script>
  <script src="js/modules/kpis/kpis.js?v=5.0.1"></script>
  <script src="js/modules/business/business.js?v=5.0.1"></script>
  <script src="js/modules/automation/automation.js?v=5.0.1"></script>
  <script src="js/modules/decision/decision.js?v=5.0.1"></script>
  <script src="js/modules/settings/settings.js?v=5.0.1"></script>

  <!-- ===================================================== -->
  <!-- 10. Application Bootstrap                            -->
  <!-- App registers its DOM-ready startup before extensions. -->
  <!-- ===================================================== -->

  <script src="js/core/app.js?v=5.0.2"></script>

  <!-- ===================================================== -->
  <!-- 11. AI Intelligence Extensions - Phase 7             -->
  <!-- ===================================================== -->

  <script src="js/extensions/ai/ai-intelligence-core.js?v=1.0.0"></script>
  <script src="js/extensions/ai/project-ai-advisor.js?v=1.0.0"></script>
  <script src="js/extensions/ai/project-risk-intelligence.js?v=1.0.0"></script>
  <script src="js/extensions/ai/idea-ai-scoring.js?v=1.0.0"></script>
  <script src="js/extensions/ai/similarity-intelligence.js?v=1.0.0"></script>
  <script src="js/extensions/ai/executive-insights.js?v=1.0.0"></script>
  <script src="js/extensions/ai/ai-intelligence-ui.js?v=1.0.0"></script>

  <!-- ===================================================== -->
  <!-- 12. Enterprise Integration Layer - Phase 8           -->
  <!-- ===================================================== -->

  <script src="js/extensions/integration/event-bus.js?v=1.0.0"></script>
  <script src="js/extensions/integration/integration-core.js?v=1.0.0"></script>
  <script src="js/extensions/integration/kpi-auto-engine.js?v=1.0.0"></script>
  <script src="js/extensions/integration/dashboard-auto-sync.js?v=1.0.0"></script>
  <script src="js/extensions/integration/reports-auto-builder.js?v=1.0.0"></script>
  <script src="js/extensions/integration/notification-integration-engine.js?v=1.0.0"></script>
  <script src="js/extensions/integration/executive-timeline-engine.js?v=1.0.0"></script>
  <script src="js/extensions/integration/smart-recommendation-engine.js?v=1.0.0"></script>
  <script src="js/extensions/integration/integration-health-monitor.js?v=1.0.0"></script>
  <script src="js/extensions/integration/integration-test-suite.js?v=1.0.0"></script>
  <script src="js/extensions/integration/integration-bootstrap-manager.js?v=1.0.0"></script>
  <script src="js/extensions/integration/integration-orchestrator.js?v=1.0.0"></script>
</body>
</html>
